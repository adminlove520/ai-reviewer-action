name: 'AI Code Review'
description: '基于大模型的自动化代码审查 GitHub Action'
author: 'adminlove520'
version: '1.0.0'

inputs:
  github-token:
    description: 'GitHub Token'
    required: true
  llm-provider:
    description: 'LLM Provider (deepseek/openai/anthropic/qwen/zhipuai/minimax)'
    required: false
    default: 'deepseek'
  llm-model:
    description: 'LLM Model'
    required: false
    default: ''
  review-style:
    description: 'Review style (professional/sarcastic/gentle/humorous)'
    required: false
    default: 'professional'
  comment-mode:
    description: 'Comment mode (summary/detailed)'
    required: false
    default: 'summary'

runs:
  using: 'python'
  main: 'action.py'
